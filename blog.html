---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>blog | Samuele Amato</title>
<meta name="author" content="Samuele Amato">
<meta name="description" content="Samuele Amato's blog posts.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #f9f9f9;
    --text-color: #111111;
    --heading-color: #222222;
    --link-color: #444444;
    --link-hover: #000000;

    --font-family--headings: "Instrument Serif", serif;
    --font-family--body: "Lora", serif;
    --font-size--medium: 1.05rem;
    --font-size--xx-large: clamp(2.5rem, 2.5rem + ((1vw - 0.2rem) * 1.283), 3.27rem);
}

[data-theme="dark"] {
    --bg-color: #121212;
    --text-color: #e0e0e0;
    --heading-color: #ffffff;
    --link-color: #aaaaaa;
    --link-hover: #ffffff;
}

body {
    overflow-x: hidden;
    margin: 0;
    padding: 20px;
    width: 100%;
    min-height: 100vh;
    box-sizing: border-box;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-family--body);
    font-size: var(--font-size--medium);
    line-height: 1.55;
    transition: background 0.2s ease, color 0.2s ease;
}

/* BOTTONI */
.toggles-wrapper {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 15px;
}

.btn-toggle {
    background: none;
    border: none;
    color: var(--text-color);
    font-family: monospace;
    font-size: 0.9em;
    cursor: pointer;
    padding: 5px;
}

.btn-toggle:hover {
    text-decoration: underline;
}

.container {
    max-width: 620px;
    margin: 0 auto;
    padding-top: 40px;
}

.page-header {
    margin-bottom: 40px;
}

.page-title {
    color: var(--heading-color);
    font-family: var(--font-family--headings);
    font-size: var(--font-size--xx-large);
    font-weight: 400;
    font-style: italic;
    line-height: 1.15;
    margin: 0 0 5px 0;
}

a {
    color: var(--link-color);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
}

a:hover {
    color: var(--link-hover);
}

ul.posts-list {
    list-style: none;
    padding-left: 0;
    margin: 0 0 40px 0;
}

ul.posts-list li {
    margin: 15px 0;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
}

span.post-date {
    color: #666;
    margin-right: 15px;
    font-size: 0.9em;
    min-width: 90px;
}

[data-theme="dark"] span.post-date {
    color: #888;
}

.back-link {
    font-size: 0.9em;
    margin-top: 20px;
}

/* Lingue */
[lang="it"] .lang-en,
[lang="en"] .lang-it {
    display: none !important;
}
</style>
</head>
<body>

<div class="toggles-wrapper">
    <button id="lang-toggle" class="btn-toggle">[ it ]</button>
    <button id="theme-toggle" class="btn-toggle">[ dark ]</button>
</div>

<div class="container">

    <div class="page-header">
        <h1 class="page-title">
            <span class="lang-en">BLOG INDEX</span>
            <span class="lang-it">INDICE BLOG</span>
        </h1>

        <div class="rss-link">
            <small><a href="{{ '/feed.xml' | relative_url }}"><i>rss</i></a></small>
        </div>
    </div>

    <ul class="posts-list">
    {% for post in site.posts %}
        <li class="post-item" data-lang="{{ post.lang | default: 'en' }}">
            <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </li>
    {% endfor %}
    </ul>

    <div class="back-link">
        <a href="{{ '/' | relative_url }}">
            <span class="lang-en">← back to homepage</span>
            <span class="lang-it">← torna alla homepage</span>
        </a>
    </div>

</div>

<script>
/* THEME */
const themeBtn = document.getElementById('theme-toggle');

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeBtn.textContent = theme === 'dark' ? '[ dark ]' : '[ light ]';
}

const currentTheme =
    localStorage.getItem('theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

applyTheme(currentTheme);

themeBtn.addEventListener('click', () => {
    const theme =
        document.documentElement.getAttribute('data-theme') === 'dark'
            ? 'light'
            : 'dark';

    localStorage.setItem('theme', theme);
    applyTheme(theme);
});

/* LANGUAGE */
const langBtn = document.getElementById('lang-toggle');
const postItems = document.querySelectorAll('.post-item');

function applyLang(lang) {
    document.documentElement.setAttribute('lang', lang);

    langBtn.textContent = lang === 'en' ? '[ en ]' : '[ it ]';

    postItems.forEach(item => {
        if (item.getAttribute('data-lang') === lang) {
            item.style.display = 'flex';
        } else {
            item.style.display = 'none';
        }
    });
}

const currentLang = localStorage.getItem('lang') || 'en';
applyLang(currentLang);

langBtn.addEventListener('click', () => {
    const newLang =
        document.documentElement.getAttribute('lang') === 'en'
            ? 'it'
            : 'en';

    localStorage.setItem('lang', newLang);
    applyLang(newLang);
});
</script>

</body>
</html>
