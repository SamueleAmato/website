<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>donate | Samuele Amato</title>
<meta name="author" content="Samuele Amato">
<meta name="description" content="Donate | Samuele Amato">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #f9f9f9;
    --text-color: #111111;
    --heading-color: #222222;
    --link-color: #444444;
    --link-hover: #000000;
    
    --font-family--headings: "Instrument Serif", serif;
    --font-family--body: "Lora", serif;
    --font-size--medium: 1.05rem;
    --font-size--xx-large: clamp(2.5rem, 2.5rem + ((1vw - 0.2rem) * 1.283), 3.27rem);
}

[data-theme="dark"] {
    --bg-color: #121212;
    --text-color: #e0e0e0;
    --heading-color: #ffffff;
    --link-color: #aaaaaa;
    --link-hover: #ffffff;
}

body {
    overflow-x: hidden;
    margin: 0;
    padding: 20px;
    width: 100%;
    min-height: 100vh;
    box-sizing: border-box;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-family--body);
    font-size: var(--font-size--medium);
    line-height: 1.55;
    transition: background 0.2s ease, color 0.2s ease;
}

.theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    color: var(--text-color);
    font-family: monospace;
    font-size: 0.9em;
    cursor: pointer;
    padding: 5px;
}

.container {
    max-width: 620px;
    margin: 0 auto;
    padding-top: 40px;
}

.page-title {
    color: var(--heading-color);
    font-family: var(--font-family--headings);
    font-size: var(--font-size--xx-large);
    font-weight: 400;
    font-style: italic;
    margin: 0 0 30px 0;
}

.donation-section {
    margin-bottom: 50px;
}

.donation-section h2 {
    font-family: var(--font-family--headings);
    font-size: 1.5rem;
    margin-bottom: 10px;
}

.address-box {
    background: rgba(128, 128, 128, 0.1);
    padding: 10px;
    font-family: monospace;
    font-size: 0.85rem;
    word-break: break-all;
    margin-bottom: 15px;
    border-radius: 4px;
}

.qr-code {
    max-width: 200px;
    display: block;
    margin-bottom: 20px;
}

a { color: var(--link-color); text-decoration: underline; }
a:hover { color: var(--link-hover); }
.back-link { margin-top: 20px; display: inline-block; font-size: 0.9em; }
</style>
</head>
<body>

<button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">[ dark ]</button>

<div class="container">
    <h1 class="page-title">DONATE</h1>
    
    <p><i>If you enjoy my work, consider supporting me.</i></p>

    <div class="donation-section">
        <h2>Monero</h2>
        <img src="xrm_wallet.png" alt="Monero QR" class="qr-code">
        <div class="address-box">86eZW5UX45yBo6Py7aoudej2rirVirGn4hbS59xUFSUu7TpMFguPQeT1yoTvYJtFbAe1Kn8KaK6TfBcdweDq1AZNNgqhWZt</div>
    </div>

    <div class="donation-section">
        <h2>Bitcoin</h2>
        <img src="btc_wallet.png" alt="Bitcoin QR" class="qr-code">
        <div class="address-box">bc1qav55je50wf5hmeftqu6g38pc3h6ledzvq5ads8</div>
    </div>

    <a href="{{ '/' | relative_url }}" class="back-link">← back to homepage</a>
</div>

<script>
    const toggleBtn = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    
    document.documentElement.setAttribute('data-theme', currentTheme);
    toggleBtn.textContent = currentTheme === 'dark' ? '[ light ]' : '[ dark ]';

    toggleBtn.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        toggleBtn.textContent = theme === 'dark' ? '[ light ]' : '[ dark ]';
    });
</script>
</body>
</html>
