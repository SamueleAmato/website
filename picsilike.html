<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pics that inspire me</title>
<link rel="icon" href="https://samueleamato.xyz/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<style>
/* --- VARIABILI DI TEMA (CHIARO/SCURO) --- */
:root {
    --bg-color: #f9f9f9;
    --text-color: #111111;
    --heading-color: #222222;
    --link-color: #444444;
    --link-hover: #000000;
    --font-family--headings: "Instrument Serif", serif;
    --font-family--body: "Lora", serif;
    --font-size--medium: 1.05rem;
    --font-size--xx-large: clamp(2.5rem, 2.5rem + ((1vw - 0.2rem) * 1.283), 4rem);
}
[data-theme="dark"] {
    --bg-color: #121212;
    --text-color: #e0e0e0;
    --heading-color: #ffffff;
    --link-color: #aaaaaa;
    --link-hover: #ffffff;
}
body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    box-sizing: border-box;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-family--body);
    font-size: var(--font-size--medium);
    line-height: 1.55;
    transition: background 0.2s ease, color 0.2s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
}
/* --- PULSANTE DARK MODE SUCKLESS --- */
.theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    color: var(--text-color);
    font-family: monospace;
    font-size: 0.9em;
    cursor: pointer;
    padding: 5px;
}
.theme-toggle:hover {
    text-decoration: underline;
}
.content-wrapper {
    text-align: left;
    max-width: 900px;
    width: 100%;
    padding: 60px 20px 20px 20px;
    box-sizing: border-box;
}
/* --- TITOLO PAGINA --- */
.page-title {
    font-family: var(--font-family--headings);
    font-size: var(--font-size--xx-large);
    font-weight: 400;
    font-style: italic;
    color: var(--heading-color);
    margin: 0 0 30px 0;
    line-height: 1.1;
}
/* --- NAVIGAZIONE TOP --- */
.top-nav {
    margin-bottom: 40px;
    font-family: var(--font-family--headings);
    font-size: 1.5rem;
    font-style: italic;
    border-bottom: 1px solid var(--border-color, #dddddd);
    padding-bottom: 10px;
}
[data-theme="dark"] .top-nav {
    border-bottom: 1px solid #333333;
}
.top-nav a {
    margin-right: 15px;
    text-decoration: none;
}
.top-nav a:hover {
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
}
/* --- LINK GENERALI --- */
a {
    color: var(--link-color);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
}
a:hover {
    color: var(--link-hover);
}

/* --- STILI GALLERIA MINIMALE --- */
.intro-text {
    margin-bottom: 40px;
    font-size: var(--font-size--medium);
}
.gallery {
    display: flex;
    flex-direction: column;
    gap: 60px; /* Spazio arioso tra le immagini */
    align-items: center;
}
.gallery img {
    max-width: 100%;
    height: auto;
    display: block;
    border-radius: 2px; /* Opzionale, per un tocco leggermente più morbido */
}
</style>
</head>
<body>
<button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">[ dark ]</button>
<div class="content-wrapper">

    <h1 class="page-title">Pics that inspire me</h1>

    <div class="top-nav">
        <a href="{{ '/' | relative_url }}">home</a>
        <a href="https://www.youtube.com/@rdweii">youtube</a>
        <a href="https://github.com/SamueleAmato">github</a>
        <a href="{{ '/contact.html' | relative_url }}">contact</a>
        <a href="https://drive.proton.me/urls/0K7CYY9P7M#5EtkxsYKIxck">resume</a>
        <a href="{{ '/feed.xml' | relative_url }}">rss</a>
    </div>

    <p class="intro-text">Photos I find inspiring, taken by myself and/or found on the internet.</p>

    <div class="gallery">
        <img src="assets/images/picsilike/campeggio1.jpg" alt="Campeggio 1">
        <img src="assets/images/picsilike/campeggio2.jpg" alt="Campeggio 2">
        <img src="assets/images/picsilike/golconda.jpeg" alt="Golconda">
        <img src="assets/images/picsilike/trip.jpg" alt="Trip">
        <img src="assets/images/picsilike/df1.jpg" alt="DF 1">
    </div>

</div>
<script>
    const toggleBtn = document.getElementById('theme-toggle');

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        toggleBtn.textContent = theme === 'dark' ? '[ light ]' : '[ dark ]';
    }

    const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(currentTheme);

    toggleBtn.addEventListener('click', () => {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', theme);
        applyTheme(theme);
    });
</script>
</body>
</html>
